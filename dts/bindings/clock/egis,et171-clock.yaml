description: ET171 clock controller node

compatible: "egis,et171-clock"

include:
  - base.yaml
  - clock-controller.yaml

properties:
  "#clock-cells":
    const: 1

  ahb-divide:
    type: int
    enum: [1, 2, 3, 4, 6, 8, 16]
    description: |
      The divide number of AHB base clock for bus.
      That cannot be used simultaneously with ahb-clock.

  ahb-clock:
    type: int
    description: |
      Advanced High-performance Bus clock frequency.
      This is not a precise clock setting, but rather uses the root clock
      to automatically select the most suitable ahb-divide.
      That cannot be used simultaneously with ahb-divide.

  apb-divide:
    type: int
    enum: [1, 2, 3, 4, 6, 8, 16]
    description: |
      The divide number of APB base clock for bus.
      That cannot be used simultaneously with apb-clock.

  apb-clock:
    type: int
    description: |
      Advanced Peripheral Bus clock frequency.
      This is not a precise clock setting, but rather uses the AHB clock
      to automatically select the most suitable apb-divide.
      That cannot be used simultaneously with apb-divide.

clock-cells:
  - clkid
